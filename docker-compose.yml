services:
  backend:
    build: ./apps/backend
    container_name: lab-backend
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - observability-net

  frontend:
    build: ./apps/frontend
    container_name: lab-frontend
    environment:
      - BACKEND_URL=http://lab-backend:3001 
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - observability-net

  prometheus:
    image: prom/prometheus:v3.8.1
    container_name: lab-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - observability-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  loki:
    image: grafana/loki:3.4.0
    container_name: lab-loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - observability-net

  alloy:
    image: grafana/alloy:v1.10.0
    container_name: lab-alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "12345:12345"
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - observability-net

  grafana:
    image: grafana/grafana:12.4.0
    container_name: lab-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_DEFAULT_THEME=light
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - observability-net

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: lab-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    ports:
      - "9100:9100"
    networks:
      - observability-net
      
networks:
  observability-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
