global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ['lab-backend:3001'] # Modificado (Usa el container_name)

  - job_name: frontend
    metrics_path: /metrics
    static_configs:
      - targets: ['lab-frontend:8080'] # Modificado (Usa el container_name)
  
  - job_name: node-exporter
    static_configs:
      - targets: ['lab-node-exporter:9100'] # Modificado (Usa el container_name)